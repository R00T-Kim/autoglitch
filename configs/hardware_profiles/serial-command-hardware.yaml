adapter_id: serial-command-hardware
display_name: Legacy Serial Text Bridge
transport: serial
protocol: legacy-text
supported_targets:
  - stm32f303
  - esp32
  - nrf52832
  - stm32f3
  - nrf52
  - '*'
capabilities:
  - glitch.execute
  - target.reset
  - target.trigger
default_baudrate: 115200
default_timeout_s: 0.25
max_confidence: 0.88
metadata:
  handshake: HELLO -> pong
