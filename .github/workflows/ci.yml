name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e . --no-deps --no-build-isolation
          python -m pip install ruff

      - name: Ruff lint
        run: ruff check src tests --exit-zero

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install typecheck dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e . --no-deps --no-build-isolation
          python -m pip install mypy

      - name: Mypy
        run: python -m mypy src || true

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .[test] --no-deps --no-build-isolation
          python -m pip install pytest pytest-cov pytest-xdist numpy pyyaml pyserial pydantic

      - name: Static compile check
        run: python -m compileall src tests

      - name: Run tests
        run: pytest -q -n auto
