name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e . --no-deps --no-build-isolation
          python -m pip install ruff

      - name: Ruff lint
        run: ruff check src tests --select E,F --ignore E501

      - name: Ruff upgraded subsystems
        run: |
          ruff check --select E,F,I,SIM --ignore E501 \
            src/agentic \
            src/cli_agentic.py \
            src/cli_batch.py \
            src/cli_commands.py \
            src/cli_execution.py \
            src/cli_parser.py \
            src/cli_preflight.py \
            src/cli_runtime.py \
            src/cli_support.py \
            src/config/schema.py \
            src/config/validator.py \
            src/safety/controller.py \
            src/hardware/serial_async_hardware.py \
            src/hardware/serial_hardware.py \
            src/plugins/registry.py \
            src/types.py \
            tests/unit/test_agentic_policy.py \
            tests/unit/test_agentic_trace.py \
            tests/unit/test_cli_agentic.py \
            tests/unit/test_cli_advanced_modes.py \
            tests/unit/test_cli_helpers.py \
            tests/unit/test_cli_preflight.py \
            tests/unit/test_cli_rl_commands.py \
            tests/unit/test_rl_backends.py \
            tests/unit/test_config_schema.py \
            tests/unit/test_plugin_registry.py \
            tests/unit/test_safety_controller.py \
            tests/unit/test_serial_async_hardware.py

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install typecheck dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e . --no-deps --no-build-isolation
          python -m pip install mypy

      - name: Mypy upgraded subsystems
        run: |
          python -m mypy --follow-imports=silent \
            src/cli_agentic.py \
            src/cli_batch.py \
            src/cli_commands.py \
            src/cli_execution.py \
            src/cli_parser.py \
            src/cli_preflight.py \
            src/cli_runtime.py \
            src/cli_support.py \
            src/agentic/patcher.py \
            src/agentic/planner.py \
            src/agentic/policy.py \
            src/agentic/trace.py \
            src/config/schema.py \
            src/config/validator.py \
            src/safety/controller.py \
            src/hardware/serial_async_hardware.py \
            src/hardware/serial_hardware.py \
            src/plugins/registry.py \
            src/types.py

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .[test] --no-deps --no-build-isolation
          python -m pip install pytest pytest-cov pytest-xdist numpy pyyaml pyserial pydantic

      - name: Static compile check
        run: python -m compileall src tests

      - name: Run tests
        run: pytest -q -n auto
